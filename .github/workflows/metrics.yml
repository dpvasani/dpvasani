name: 📊 GitHub Profile Metrics

on:
  # Runs daily at 12:30 AM IST (19:00 UTC)
  schedule:
    - cron: "0 19 * * *"
  # Allow manual trigger for all metrics at once
  workflow_dispatch:

# ─────────────────────────────────────────────────────────────
# Jobs run ONE BY ONE using `needs:` to avoid race conditions
# and commit conflicts. Order: classic → calendar → leetcode
#                              → stackoverflow → achievements
#                              → profile-3d
# ─────────────────────────────────────────────────────────────

jobs:

  # ──────────────────────────────────────────────────────────
  # [1] Classic Template — runs first
  # ──────────────────────────────────────────────────────────
  classic-template:
    name: 📗 Classic Template
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          committer_token: ${{ secrets.GITHUB_TOKEN }}
          filename: assets/metrics.template.classic.svg

          user: dpvasani
          template: classic
          base: header, repositories
          config_timezone: Asia/Calcutta

          plugin_languages: yes
          plugin_isocalendar: yes
          plugin_isocalendar_duration: full-year

  # ──────────────────────────────────────────────────────────
  # [2] Commit Calendar — waits for classic-template
  # ──────────────────────────────────────────────────────────
  calendar:
    name: 📆 Commit Calendar
    needs: classic-template
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          committer_token: ${{ secrets.GITHUB_TOKEN }}
          filename: assets/metrics.plugin.calendar.svg

          user: dpvasani
          template: classic
          base: ""
          config_timezone: Asia/Calcutta

          # ✅ Commit Calendar Plugin
          plugin_calendar: yes
          plugin_calendar_limit: 0

          # 🌙 Tokyo Night contribution colors
          extras_css: |
            rect[fill="#ebedf0"] { fill: #1a1b27 !important; }
            rect[fill="#9be9a8"] { fill: #1f3460 !important; }
            rect[fill="#40c463"] { fill: #2d5099 !important; }
            rect[fill="#30a14e"] { fill: #5079d4 !important; }
            rect[fill="#216e39"] { fill: #7aa2f7 !important; }
            svg.calendar text { fill: #a9b1d6 !important; }
            .text-muted { fill: #6b7280 !important; }
            svg { background-color: #1a1b27 !important; }

  # ──────────────────────────────────────────────────────────
  # [3] LeetCode Stats — waits for calendar
  # ──────────────────────────────────────────────────────────
  leetcode:
    name: 🗳️ LeetCode Stats
    needs: calendar
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          committer_token: ${{ secrets.GITHUB_TOKEN }}
          filename: assets/metrics.plugin.leetcode.svg

          user: dpvasani
          template: classic
          base: ""
          config_timezone: Asia/Calcutta

          config_display: large

          plugin_leetcode: yes
          plugin_leetcode_user: dpvasani56
          plugin_leetcode_sections: solved,skills,recent
          plugin_leetcode_limit_skills: 10
          plugin_leetcode_ignored_skills: ""
          plugin_leetcode_limit_recent: 5

  # ──────────────────────────────────────────────────────────
  # [4] Stack Overflow Stats — waits for leetcode
  # ──────────────────────────────────────────────────────────
  stackoverflow:
    name: 🗨️ Stack Overflow Stats
    needs: leetcode
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          committer_token: ${{ secrets.GITHUB_TOKEN }}
          filename: assets/metrics.plugin.stackoverflow.svg

          user: dpvasani
          template: classic
          base: ""
          config_timezone: Asia/Calcutta

          plugin_stackoverflow: yes
          plugin_stackoverflow_user: 22938645
          plugin_stackoverflow_sections: answers-top, questions-recent
          plugin_stackoverflow_limit: 3
          plugin_stackoverflow_lines: 5
          plugin_stackoverflow_lines_snippet: 3

  # ──────────────────────────────────────────────────────────
  # [5] Achievements — waits for stackoverflow
  # NOTE: Uses dkhokhlov/metrics@master (supports achievements plugin)
  # ──────────────────────────────────────────────────────────
  achievements:
    name: 🏆 Achievements
    needs: stackoverflow
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          persist-credentials: true
      - name: Generate Achievements Metrics
        uses: dkhokhlov/metrics@master
        with:
          filename: assets/metrics.plugin.achievements.svg
          token: ${{ secrets.METRICS_TOKEN }}
          committer_token: ${{ secrets.GITHUB_TOKEN }}
          user: dpvasani
          base: ""
          template: classic
          config_timezone: Asia/Calcutta
          plugin_achievements: yes
          plugin_achievements_threshold: X
          plugin_achievements_secrets: yes
          plugin_achievements_display: compact
          plugin_achievements_limit: 0
          plugin_achievements_ignored: ""

  # ──────────────────────────────────────────────────────────
  # [6] 3D Contribution Graph — runs last, pushes to separate branch
  # ──────────────────────────────────────────────────────────
  profile-3d:
    name: 🌐 3D Contribution Graph
    needs: achievements
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: yoshi389111/github-profile-3d-contrib@0.7.1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          USERNAME: ${{ github.repository_owner }}
          SETTING_JSON: conf/github-profile-3d-contrib.json
      - name: Commit & Push
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output-3d-contrib
          build_dir: profile-3d-contrib
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
