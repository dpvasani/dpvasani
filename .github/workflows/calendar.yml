name: 📆 Commit Calendar

on:
  # Automatically run every Sunday at 1:10 AM IST (19:40 UTC)
  schedule:
    - cron: "40 19 * * 0"
  # Allow manual runs
  workflow_dispatch:

jobs:
  calendar-metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          committer_token: ${{ secrets.GITHUB_TOKEN }}
          filename: assets/metrics.plugin.calendar.svg

          # Base settings
          user: dpvasani
          template: classic
          base: ""
          config_timezone: Asia/Calcutta

          # 🎨 Dark background matching Tokyo Night theme
          config_background: "#1a1b27"

          # ✅ Commit Calendar Plugin
          plugin_calendar: yes
          plugin_calendar_limit: 0   # You can use 1, 0, or -1 as explained

          # 🌙 Tokyo Night contribution colors (replaces GitHub green)
          # The metrics SVG renders rects with inline fill attributes (#ebedf0, #9be9a8, etc.)
          # so we target those exact hex values instead of data-level attributes.
          extras_css: |
            rect[fill="#ebedf0"] { fill: #1a1b27 !important; }
            rect[fill="#9be9a8"] { fill: #1f3460 !important; }
            rect[fill="#40c463"] { fill: #2d5099 !important; }
            rect[fill="#30a14e"] { fill: #5079d4 !important; }
            rect[fill="#216e39"] { fill: #7aa2f7 !important; }
            svg.calendar text { fill: #a9b1d6 !important; }
            .text-muted { fill: #6b7280 !important; }
