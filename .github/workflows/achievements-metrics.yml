name: 🏆 Achievements
on:
  schedule: [{ cron: "0 */12 * * *" }]
  workflow_dispatch:
  push:
    branches: ["master", "main"]

permissions:
  contents: write
  actions: read
  
jobs:
  achievements:
    runs-on: ubuntu-latest
    steps:
      - name: Generate Achievements Metrics
        # Uses fork that migrates from deprecated `projects` to `projectsV2` GraphQL API
        # (see lowlighter/metrics#1769). Switch back to lowlighter/metrics@latest once merged.
        uses: dkhokhlov/metrics@master
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          filename: assets/metrics.plugin.achievements.svg
          committer_token: ${{ secrets.METRICS_TOKEN }}
          committer_branch: main
          committer_message: "Update achievements metrics"
          user: dpvasani
          template: classic
          base: header
          config_timezone: Asia/Calcutta
          plugin_achievements: yes
          plugin_achievements_display: compact
          plugin_achievements_threshold: C
